name: Build Android APK

# CI-first Android build. Android cannot be built on the macOS dev machine (no SDK/JDK), so this
# workflow is the build feedback loop: it builds both product flavors' debug APKs and uploads them
# as artifacts, failing loud (not silently) if either is missing. Runs on push to main AND on every
# PR touching android/ or core/ (S01: the engine's Rust side feeds the same APKs via cargoNdkBuild),
# so a PR gets the same signal before it merges instead of only after.
# The shared engine (stremio-core via JNI), the libmpv player, and the Compose UI matching tvOS/iOS
# are added incrementally on top of this verified skeleton.

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "core/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - "core/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # No `gradle-version:` pin here: android/gradle/wrapper/gradle-wrapper.properties (S01 version
      # catalog + wrapper) is the single source of truth for the Gradle version (8.11.1, the floor
      # AGP 8.10.0 requires for compileSdk/targetSdk 36). This step only wires up dependency caching
      # and build-scan capture around the `./gradlew` invocations below.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # The Compose app links libstremiox_core.so, cross-compiled from core/ by the gradle
      # cargoNdkBuild task (`cargo ndk -t arm64-v8a -t x86_64 -p 26 ... build --release`). That
      # needs: the NDK pinned in app/build.gradle.kts (ndkVersion), Rust nightly with the Android
      # targets (core/ pins nightly via rust-toolchain.toml; the android targets are tier-2, so no
      # build-std), and the cargo-ndk subcommand. Without these the task fails with
      # "error: no such command: ndk" / a missing NDK.
      - name: Install Android NDK (must match ndkVersion in app/build.gradle.kts)
        run: |
          yes | sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust nightly + Android targets
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,x86_64-linux-android
          components: rust-src

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "core -> target"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version "^3" --locked

      # Build each flavor's debug APK explicitly (not the blanket `assembleDebug`) so a task name typo
      # or a flavor-scoped failure is attributable in the log, and so the "did both flavors actually
      # produce an APK" check below has an unambiguous pair of paths to look for.
      - name: Build full + play debug APKs
        working-directory: android
        run: ./gradlew assembleFullDebug assemblePlayDebug --no-daemon --stacktrace

      # Fail loud (not "upload whatever exists") if either flavor's APK didn't come out the other end
      # -- a silent gap here previously let a broken flavor pass CI. Checked before the upload step so
      # the job fails with a clear, flavor-attributed message instead of upload-artifact's generic
      # "no files matched" error.
      - name: Verify both flavor APKs were produced
        working-directory: android
        run: |
          for flavor in full play; do
            if ! compgen -G "app/build/outputs/apk/$flavor/debug/*.apk" > /dev/null; then
              echo "::error::No debug APK found for the '$flavor' flavor (expected app/build/outputs/apk/$flavor/debug/*.apk)"
              exit 1
            fi
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: VortX-Android-debug
          path: android/app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: error
